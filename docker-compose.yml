version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: autiguard-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: autiguard-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
