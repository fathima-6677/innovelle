apiVersion: v1
kind: Namespace
metadata:
  name: autiguard

---
apiVersion: v1
kind: Secret
metadata:
  name: autiguard-aws-secrets
  namespace: autiguard
type: Opaque
data:
  # Base64 encoded AWS credentials (placeholder - update with your encoded credentials)
  # echo -n "YOUR_KEY" | base64
  AWS_ACCESS_KEY_ID: QUtJQVZIRUFZTlBBSkI1TTdETA==
  AWS_SECRET_ACCESS_KEY: QXFaekhiT3A0V3hEc0dwSnhTV1J2Q1JJb042NC9MMU94c0lOd2NFSwo=

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autiguard-config
  namespace: autiguard
data:
  AWS_DEFAULT_REGION: "ap-south-1"
  DYNAMODB_TABLE: "AutiGuardCore"
  COGNITO_USER_POOL_ID: "ap-south-1_n9TxDAu3z"
  COGNITO_CLIENT_ID: "3qu3kqqt4beqo1p6r02f8l1c09"
  KMS_KEY_ID: "9d4d41d7-bf21-45b4-aae2-8f57d55c522e"
  MOCK_AWS: "False"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autiguard-backend
  namespace: autiguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autiguard-backend
  template:
    metadata:
      labels:
        app: autiguard-backend
    spec:
      containers:
      - name: backend
        image: autiguard-backend:latest
        imagePullPolicy: Never # Loads from Rancher local image cache
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: autiguard-config
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: autiguard-aws-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: autiguard-aws-secrets
              key: AWS_SECRET_ACCESS_KEY

---
apiVersion: v1
kind: Service
metadata:
  name: autiguard-backend-service
  namespace: autiguard
spec:
  selector:
    app: autiguard-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autiguard-frontend
  namespace: autiguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autiguard-frontend
  template:
    metadata:
      labels:
        app: autiguard-frontend
    spec:
      containers:
      - name: frontend
        image: autiguard-frontend:latest
        imagePullPolicy: Never # Loads from Rancher local image cache
        ports:
        - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: autiguard-frontend-service
  namespace: autiguard
spec:
  selector:
    app: autiguard-frontend
  ports:
  - protocol: TCP
    port: 5173
    targetPort: 5173
  type: NodePort
